<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="google-site-verification" content="8M724fnsKG2CZbWG588YdApv-IoF8S3SUR9nCvm0eZQ" />
<meta name="description" content="{% block meta_desc %}Lottery Sambad tendency checker — evidence-based scoring from historical draw data.{% endblock %}">
<title>{% block title %}Lottery Sambad Tendency Checker{% endblock %}</title>
<style>
  :root {
    --bg: #0f1117; --card: #1a1d27; --border: #2a2d3e;
    --accent: #6c63ff; --hot: #f59e0b; --warm: #10b981;
    --cold: #ef4444; --neutral: #6b7280; --text: #e2e8f0;
    --muted: #94a3b8; --radius: 12px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header { background: linear-gradient(135deg,#1a1d27 0%,#0f1117 100%); border-bottom: 1px solid var(--border); padding: 20px 0 0; text-align: center; }
  header h1 { font-size: 1.5rem; font-weight: 700; }
  header h1 span { color: var(--accent); }
  header p { color: var(--muted); font-size: .85rem; margin-top: 4px; }

  nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 4px; padding: 12px 16px 0; }
  nav a { color: var(--muted); font-size: .8rem; padding: 5px 10px; border-radius: 6px; border: 1px solid transparent; transition: all .15s; }
  nav a:hover, nav a.active { color: var(--text); border-color: var(--border); background: var(--card); text-decoration: none; }
  .nav-sep { color: var(--border); padding: 5px 2px; font-size: .8rem; }

  main { max-width: 900px; margin: 0 auto; padding: 28px 16px 60px; }

  .page-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 6px; }
  .page-sub   { color: var(--muted); font-size: .9rem; margin-bottom: 24px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card + .card { margin-top: 16px; }
  .card h3 { font-size: .8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 14px; }

  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  @media(max-width: 600px){ .grid-2 { grid-template-columns: 1fr; } }

  table { width: 100%; border-collapse: collapse; font-size: .85rem; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 6px 8px; border-bottom: 1px solid var(--border); }
  td { padding: 8px; border-bottom: 1px solid #1e2130; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #1e2130; }

  .badge { display: inline-block; border-radius: 4px; padding: 2px 8px; font-size: .75rem; font-weight: 600; }
  .badge-1 { background:#7c3aed22; color:#a78bfa; }
  .badge-2 { background:#0284c722; color:#38bdf8; }
  .badge-3 { background:#05966922; color:#34d399; }
  .badge-4 { background:#d9770622; color:#fb923c; }
  .badge-5 { background:#be185d22; color:#f472b6; }

  .score-big { font-size: 3rem; font-weight: 800; line-height: 1; }
  .score-hot  { color: var(--hot); }
  .score-warm { color: var(--warm); }
  .score-avg  { color: var(--accent); }
  .score-cold { color: var(--cold); }

  .stat-grid { display: flex; gap: 24px; flex-wrap: wrap; }
  .stat { flex: 1; min-width: 80px; }
  .stat-val { font-size: 1.4rem; font-weight: 700; }
  .stat-key { font-size: .75rem; color: var(--muted); margin-top: 2px; }

  .hot-grid { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
  .hot-chip { background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; font-size: .85rem; display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .hot-chip a { color: var(--text); font-weight: 700; letter-spacing: 1px; }
  .hot-chip .cs { font-size: .7rem; color: var(--muted); }

  .history-list { max-height: 300px; overflow-y: auto; }
  .history-item { display: flex; gap: 10px; padding: 7px 0; border-bottom: 1px solid #1e2130; font-size: .83rem; }
  .history-item:last-child { border-bottom: none; }
  .h-date { color: var(--muted); min-width: 95px; }
  .h-time { color: var(--muted); min-width: 75px; }

  .disclaimer { margin-top: 32px; background: #1a1d27; border: 1px solid #2a2d3e; border-left: 3px solid var(--accent); border-radius: var(--radius); padding: 14px 16px; font-size: .8rem; color: var(--muted); line-height: 1.6; }

  .tag { display: inline-block; background: #22263a; border: 1px solid var(--border); border-radius: 6px; padding: 3px 10px; font-size: .78rem; color: var(--muted); margin: 2px; }
  .tag a { color: var(--muted); }
  .tag a:hover { color: var(--text); text-decoration: none; }

  .btn { display: inline-block; background: var(--accent); color: #fff; border-radius: 8px; padding: 8px 20px; font-size: .85rem; font-weight: 600; }
  .btn:hover { opacity: .85; text-decoration: none; }

  .nav-pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
  .nav-pill { border: 1px solid var(--border); border-radius: 20px; padding: 5px 14px; font-size: .82rem; color: var(--muted); }
  .nav-pill:hover, .nav-pill.active { background: var(--accent); border-color: var(--accent); color: #fff; text-decoration: none; }

  .ad-top, .ad-bottom { background: #12151f; border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: center; min-height: 90px; padding: 8px 0; }
  .ad-placeholder { border: 1px dashed #3a3d50; border-radius: 8px; background: #13162080; display: flex; align-items: center; justify-content: center; color: #4a5068; font-size: .72rem; letter-spacing: .5px; text-transform: uppercase; width: 728px; max-width: 100%; height: 90px; }
</style>
{% block extra_style %}{% endblock %}
</head>
<body>

<header>
  <h1><a href="/" style="color:inherit;text-decoration:none">Lottery Sambad <span>Tendency Checker</span></a></h1>
  <p>Evidence-based scoring from historical draw data</p>
  <nav>
    <a href="/">Check Number</a>
    <span class="nav-sep">|</span>
    <a href="/results/">Results</a>
    <span class="nav-sep">|</span>
    <a href="/hot/prize-5">Hot Numbers</a>
    <span class="nav-sep">|</span>
    <a href="/draw/1pm">Day Draw</a>
    <a href="/draw/6pm">Evening Draw</a>
    <a href="/draw/8pm">Night Draw</a>
  </nav>
</header>

<div class="ad-top"><div class="ad-placeholder">Advertisement</div></div>

<main>
{% block content %}{% endblock %}
</main>

<div class="ad-bottom"><div class="ad-placeholder">Advertisement</div></div>

</body>
</html>
